name: AI Code Review

# PR마다 Claude (Bedrock 호스팅) 가 변경 사항을 자동 리뷰하여 PR 코멘트로 게시합니다.
# aws-fsi-demo 의 검증된 패턴을 그대로 적용:
#   - self-hosted 러너 IAM Instance Profile 로 Bedrock 호출 (OIDC step 불필요)
#   - claude CLI: `cat diff | claude -p "$(cat prompt)" --output-format text`
#   - VERDICT: PASS|FAIL 마지막 줄 룰로 job exit code 결정
#   - <!-- aws-demo-platform-pr-review --> marker 로 코멘트 upsert (PR 업데이트마다 새 코멘트 안 쌓임)

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: aws-demo-platform-claude-arm
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
    env:
      # Cross-region inference profile (Asia Pacific). 서울 리전 가용성 변동을 흡수.
      # 셀프호스티드 러너의 IAM Instance Profile 에 bedrock:InvokeModel 이
      # arn:aws:bedrock:ap-northeast-2::foundation-model/anthropic.claude-opus-4-*
      # + arn:aws:bedrock:ap-northeast-2:ACCOUNT:inference-profile/global.anthropic.claude-opus-4-*
      # 권한이 부여되어 있어야 함.
      ANTHROPIC_MODEL: global.anthropic.claude-opus-4-8
      CLAUDE_CODE_USE_BEDROCK: 1
      ANTHROPIC_BEDROCK_BASE_URL: https://bedrock-runtime.ap-northeast-2.amazonaws.com
      AWS_REGION: ap-northeast-2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify Claude Code CLI present (pre-installed on runner)
        # aws-demo-platform-claude-arm 러너에는 @anthropic-ai/claude-code 가 pre-install 되어 있어야 한다.
        # docs/operations/github-actions-setup.md §2.5 참조.
        run: |
          if ! command -v claude >/dev/null 2>&1; then
            echo "::warning::claude CLI not found on runner, falling back to npm global install"
            npm install -g @anthropic-ai/claude-code
          fi
          claude --version
          # 패널 CLI 는 이미지에 baking 되어 있어야 한다. 부재 시 graceful skip(비차단).
          for c in codex kiro-cli; do
            command -v "$c" >/dev/null 2>&1 || echo "::warning::$c not found on runner (image needs rebuild)"
          done

      - name: Get PR diff (with project-specific filters)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Generated artifacts / lockfile / Lambda build dir hunks 제거.
          # 미제거 시 taxonomy_tree.json 재생성 (~128KB) 이나 staging build 가
          # diff 의 대부분을 점유해 실제 리뷰 surface 가 가려진다.
          gh pr diff "$PR_NUMBER" > /tmp/pr-diff-raw.txt
          awk '
            /^diff --git/ {
              path = substr($3, 3)
              skip = (path ~ /^src\/prompts\/v[0-9.]+\/taxonomy_tree\.(json|md)$/) ||
                     (path ~ /^infra\/modules\/[^\/]+\/build\//) ||
                     (path ~ /(^|\/)package-lock\.json$/) ||
                     (path ~ /(^|\/)yarn\.lock$/) ||
                     (path ~ /(^|\/)\.coverage$/) ||
                     (path ~ /\.terraform\.lock\.hcl$/)
            }
            !skip
          ' /tmp/pr-diff-raw.txt > /tmp/pr-diff.txt
          RAW=$(wc -l < /tmp/pr-diff-raw.txt)
          TOTAL_LINES=$(wc -l < /tmp/pr-diff.txt)
          echo "total_lines=$TOTAL_LINES" >> "$GITHUB_ENV"
          echo "Diff: $TOTAL_LINES lines (raw $RAW, filtered $((RAW - TOTAL_LINES)))"

      - name: Build panel prompt
        run: |
          set -euo pipefail
          MAX_LINES=3000
          head -"$MAX_LINES" /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
          cat <<'PROMPT_EOF' > /tmp/panel-prompt.txt
          Review the diff provided via stdin for bugs, security risks, logic errors,
          and convention violations. Output concise findings grouped CRITICAL/MAJOR/MINOR.
          DO NOT output a VERDICT line — that is the chair's job.
          한국어+영문 기술용어 혼용 가능.
          PROMPT_EOF

      - name: Run panel + synthesize (Codex + Kiro x3 -> Claude chair)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PANEL_TIMEOUT: "300"
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr-review
          bash scripts/pr-review/run-panel.sh /tmp/pr-diff-truncated.txt /tmp/panel-prompt.txt /tmp/pr-review
          bash scripts/pr-review/synthesize.sh /tmp/pr-diff-truncated.txt /tmp/pr-review \
            "$PR_NUMBER" "$PR_TITLE" /tmp/review.md
          echo "panel_responded=$(tr '\n' ' ' < /tmp/pr-review/responded.txt 2>/dev/null)" >> "$GITHUB_ENV"

      - name: Check for blocking issues
        id: gate
        run: |
          if grep -q "^VERDICT: FAIL$" /tmp/review.md; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=VERDICT: FAIL" >> "$GITHUB_OUTPUT"
          elif grep -q "^VERDICT: PASS$" /tmp/review.md; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "reason=No blocking issues" >> "$GITHUB_OUTPUT"
          else
            # fail-closed: VERDICT 라인이 없으면 안전하게 차단
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=No VERDICT line found — fail-closed" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment (upsert)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GATE_RESULT: ${{ steps.gate.outputs.result }}
        run: |
          MARKER="<!-- aws-demo-platform-pr-review -->"
          if [ "$GATE_RESULT" = "fail" ]; then
            STATUS_BADGE="**Status: BLOCKED** — CRITICAL/MAJOR issues must be resolved before merge"
          else
            STATUS_BADGE="**Status: PASSED** — No blocking issues found"
          fi
          # 마지막 VERDICT 라인은 코멘트에서 제거 (gate 신호용)
          sed '$ { /^VERDICT:/d }' /tmp/review.md > /tmp/review-clean.md
          {
            echo "$MARKER"
            echo "## 🤖 AI Code Review (Claude Opus 4.8 chair · Codex + Kiro panel)"
            echo ""
            echo "_Panel: Claude(chair) · ${panel_responded:-solo}_"
            echo ""
            echo "$STATUS_BADGE"
            echo ""
            cat /tmp/review-clean.md
            echo ""
            echo "---"
            echo "_Triggered by commit \`${{ github.event.pull_request.head.sha }}\` · workflow: \`.github/workflows/pr-review.yml\`_"
          } > /tmp/comment.md
          # 기존 marker 코멘트가 있으면 PATCH로 업서트, 없으면 새로
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- aws-demo-platform-pr-review -->")) | .id' 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/$REPO/issues/comments/$EXISTING" -X PATCH -f body="$(cat /tmp/comment.md)" 2>/dev/null || \
              gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
          fi

      - name: Fail if CRITICAL or MAJOR
        if: steps.gate.outputs.result == 'fail'
        run: |
          echo "AI Review failed: ${{ steps.gate.outputs.reason }}"
          exit 1
