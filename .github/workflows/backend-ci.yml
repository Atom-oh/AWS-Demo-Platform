name: backend-ci

on:
  pull_request:
    paths:
      - 'dashboard/backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'dashboard/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-test:
    runs-on: aws-demo-platform-arm
    defaults:
      run:
        working-directory: dashboard/backend
    services:
      localstack:
        image: localstack/localstack:3.7
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,sqs,sts,secretsmanager,iam,logs
          DEFAULT_REGION: ap-northeast-2
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.16'
          cache: 'pnpm'
          cache-dependency-path: dashboard/backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  push-images:
    # Build + push api/worker images to ECR on merge to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-test
    runs-on: aws-demo-platform-arm
    permissions:
      contents: read
      id-token: write # OIDC only for this job
    concurrency:
      group: backend-push-${{ github.ref }}
      cancel-in-progress: false
    env:
      ECR_REGISTRY: 180294183052.dkr.ecr.ap-northeast-2.amazonaws.com
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::180294183052:role/demo-platform-gha-ecr-push
          aws-region: ap-northeast-2
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Bundle worker config (projects + accounts.yaml) into build context
        working-directory: dashboard/backend
        run: |
          rm -rf ./_config && mkdir -p ./_config
          cp -r ../../projects ./_config/projects
          cp ../../accounts.yaml ./_config/accounts.yaml
      - name: Build & push api + worker
        working-directory: dashboard/backend
        run: |
          # Tag prefixed `sha-` to match the ECR lifecycle policy's tagPrefixList.
          # Pin linux/arm64 to match the Fargate Graviton runtime platform (ARM64).
          # Built natively on the aws-demo-platform-arm self-hosted runner (no emulation).
          SHA="sha-${GITHUB_SHA::12}"
          for svc in api worker; do
            REPO="$ECR_REGISTRY/demo-platform/$svc"
            docker build --platform=linux/arm64 -f "packages/$svc/Dockerfile" \
              -t "$REPO:$SHA" -t "$REPO:main-latest" .
            docker push --all-tags "$REPO"
          done
