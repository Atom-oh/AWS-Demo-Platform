# PR review 패널의 AI CLI 인증 키.
# Secrets Manager `actions/AI-key` (JSON: ANTIGRAVITY_API_KEY, KIRO_API_KEY)
#   -> K8s Secret `ai-panel-keys` -> 러너 컨테이너 env (appset).
# Codex 는 Bedrock 네이티브라 키 불필요. Antigravity 는 free tier(rate-limited, best-effort).
# NOTE: `actions/AI-key` 는 CLAUDE.md 의 `/demo-platform/*` 네이밍 컨벤션 예외다 —
#       기존에 존재하던 공용 시크릿을 재사용한다(신규 슬롯 미생성). ADR-007 참조.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-panel-keys
  namespace: actions-runner-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-panel-keys
    creationPolicy: Owner
  data:
    - secretKey: KIRO_API_KEY
      remoteRef: { key: actions/AI-key, property: KIRO_API_KEY }
    - secretKey: ANTIGRAVITY_API_KEY
      remoteRef: { key: actions/AI-key, property: ANTIGRAVITY_API_KEY }
