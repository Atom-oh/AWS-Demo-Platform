# 모든 claude-arm 러너 스케일셋이 공유하는 ServiceAccount.
# EKS Pod Identity Association(claude-runner -> mall-apne2-mgmt-ci-runner)으로 AWS 자격증명 수령.
# per-scaleset `<name>-gha-rs-no-permission` SA 대신 이걸 쓰면, 새 러너 추가 시
# Pod Identity Association 을 매번 만들 필요가 없다(공유 1개로 충분).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-runner
  namespace: actions-runner-system
