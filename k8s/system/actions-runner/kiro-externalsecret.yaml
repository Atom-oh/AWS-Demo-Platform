# PR review 패널의 Kiro CLI 인증 키.
# Secrets Manager /demo-platform/kiro/api-key (plain string) -> K8s Secret kiro-api-key.
# 러너 컨테이너가 env KIRO_API_KEY 로 주입받는다 (appset-helm-runner-claude-arm-aws-demo-platform.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiro-api-key
  namespace: actions-runner-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: kiro-api-key
    creationPolicy: Owner
  data:
    - secretKey: KIRO_API_KEY
      remoteRef: { key: /demo-platform/kiro/api-key }
