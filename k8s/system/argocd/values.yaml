global:
  domain: argocd.atomai.click
  tolerations:
    - key: node-role
      value: system-critical
      effect: NoSchedule
  nodeSelector:
    role: system

server:
  replicas: 1
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

controller:
  replicas: 1
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: "3", memory: 2Gi }
  args:
    - --status-processors
    - "10"
    - --operation-processors
    - "5"
    - --repo-server-timeout-seconds
    - "90"

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: "1", memory: 1Gi }

applicationSet:
  replicas: 1

redis-ha:
  enabled: false   # non-prod, single-replica redis ok

redis:
  enabled: true
  tolerations:
    - key: node-role
      value: system-critical
      effect: NoSchedule
  nodeSelector:
    role: system

configs:
  cm:
    # Allow the admin account to mint API tokens — the Lifecycle Controller worker
    # uses one (Secrets Manager /demo-platform/argocd/admin-token) for its ArgoCD
    # REST controller (ADR-002). A dedicated service account is a Stage 4 follow-up.
    accounts.admin: apiKey
    # --enable-helm: allow kustomize to render embedded Helm charts.
    # --load-restrictor LoadRestrictionsNone: allow kustomize bases to
    #   reference manifests outside their root dir (used by some MRA
    #   karpenter overlays that share a parent karpenter/ dir).
    kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone"
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"
    # Cluster-wide ignoreDifferences for HPA-2 on/off pattern (Section 4.2 of spec).
    # Allows backend lifecycle-controller to scale Deployments/StatefulSets/HPAs
    # without ArgoCD reverting them.
    resource.customizations.ignoreDifferences.apps_Deployment: |
      jsonPointers:
        - /spec/replicas
    resource.customizations.ignoreDifferences.apps_StatefulSet: |
      jsonPointers:
        - /spec/replicas
    resource.customizations.ignoreDifferences.autoscaling_HorizontalPodAutoscaler: |
      jsonPointers:
        - /spec/minReplicas
        - /spec/maxReplicas
    # ESO v1 mutating webhook fills in defaults for these fields, causing
    # ArgoCD to see a permanent diff against any ExternalSecret manifest
    # that omits them. Ignore cluster-wide rather than forcing every
    # ExternalSecret manifest to spell out the defaults.
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.target.deletionPolicy
    # CRD `preserveUnknownFields` is deprecated in apiextensions.k8s.io/v1
    # and silently stripped by the apiserver — manifest sets it but live
    # never has it. Ignore to stop permanent diff on every ARC sync.
    resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
      jqPathExpressions:
        - .spec.preserveUnknownFields
    # StorageClass `parameters` are immutable after creation. The live
    # gp3 SC was created with `{encrypted, type}` only; the new chart
    # wants `{fsType}` added. Cannot patch — ignore the diff.
    resource.customizations.ignoreDifferences.storage.k8s.io_StorageClass: |
      jqPathExpressions:
        - .parameters.fsType
  params:
    server.insecure: true
    controller.self.heal.timeout.seconds: "10"
