apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: runner-docs-arm
spec:
  template:
    metadata:
      labels:
        node-pool: runner-docs-arm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: runner-arm
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - r6g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - xlarge
      taints:
        - key: workload-type
          value: ci-runner-docs
          effect: NoSchedule
  limits:
    # Dedicated single-purpose pool -- no CPU cap; memory alone bounds how many
    # r6g.xlarge (32GiB) nodes Karpenter can provision concurrently. 64Gi caps
    # concurrency at 2 nodes -- downsized from r6g.2xlarge (64GiB) now that
    # kubernetes-docs' deploy.yml builds one VitePress locale at a time instead
    # of all five in a single process (~8GiB peak per locale vs. the ~50GiB+
    # the old single-process build needed).
    memory: 64Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
