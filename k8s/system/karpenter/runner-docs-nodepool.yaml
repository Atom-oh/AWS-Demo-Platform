apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: runner-docs-arm
spec:
  template:
    metadata:
      labels:
        node-pool: runner-docs-arm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: runner-arm
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - r8g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - large
      taints:
        - key: workload-type
          value: ci-runner-docs
          effect: NoSchedule
  limits:
    cpu: "8"
    memory: 64Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
