apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: runner-docs-arm
spec:
  template:
    metadata:
      labels:
        node-pool: runner-docs-arm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: runner-arm
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - r6g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - 2xlarge
      taints:
        - key: workload-type
          value: ci-runner-docs
          effect: NoSchedule
  limits:
    # Dedicated single-purpose pool -- no CPU cap; memory alone bounds how many
    # r6g.2xlarge (64GiB) nodes Karpenter can provision concurrently. 128Gi caps
    # concurrency at 2 nodes (was 2x r8g.xlarge @ 32GiB under the old sizing).
    memory: 128Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
