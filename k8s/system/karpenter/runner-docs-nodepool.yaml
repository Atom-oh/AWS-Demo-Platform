apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: runner-docs-arm
spec:
  template:
    metadata:
      labels:
        node-pool: runner-docs-arm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: runner-arm
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - r6g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - xlarge
      taints:
        - key: workload-type
          value: ci-runner-docs
          effect: NoSchedule
  limits:
    # Dedicated single-purpose pool -- no CPU cap; memory alone bounds how many
    # r6g.xlarge (32GiB) nodes Karpenter can provision concurrently. 64Gi caps
    # concurrency at 2 nodes. r8g.large (16GiB) was tried and reverted here --
    # Karpenter couldn't schedule the runner pod at all ("no instance type has
    # enough resources", computed requirement ~1971m/8826Mi once mandatory
    # daemonsets -- CNI, kube-proxy, etc. -- are counted against the node's
    # allocatable capacity), even though the pod's own request (1500m/8Gi) and
    # the measured build peak (~8GiB) both looked like they should fit on
    # paper. r6g.xlarge has enough headroom over that same daemonset overhead
    # for the pod to actually schedule.
    memory: 64Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
