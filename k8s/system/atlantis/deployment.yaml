apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: atlantis
spec:
  replicas: 1
  selector:
    matchLabels: { app: atlantis }
  template:
    metadata:
      labels: { app: atlantis }
    spec:
      serviceAccountName: atlantis
      tolerations:
        - key: workload-type
          operator: Equal
          value: platform
          effect: NoSchedule
      containers:
        - name: atlantis
          # v0.44.1 (built 2026-06-26) ships the renewed HashiCorp GPG key
          # (72D7468F, re-extended to 2030-03-01 per HCSEC-2026-03). v0.30.0 was
          # built before the 2026-04-18 expiry, so its embedded key rejected
          # terraform-version downloads with "openpgp: key expired" — only the
          # image-bundled default (1.9.6) worked. See runatlantis/atlantis#6405.
          image: ghcr.io/runatlantis/atlantis:v0.44.1
          args:
            - server
            - --repo-config=/etc/atlantis/repos.yaml
            - --atlantis-url=https://atlantis.atomai.click
            - --gh-app-id=$(GH_APP_ID)
            - --gh-app-installation-id=$(GH_APP_INSTALLATION_ID)
            - --gh-app-key-file=/secrets/private-key
            - --gh-webhook-secret=$(GH_WEBHOOK_SECRET)
            - --repo-allowlist=github.com/Atom-oh/*
            - --port=4141
            - --automerge=false
            - --hide-prev-plan-comments=true
            - --write-git-creds
          env:
            - name: GH_APP_ID
              valueFrom:
                secretKeyRef: { name: atlantis-github-app, key: app-id }
            - name: GH_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef: { name: atlantis-github-app, key: installation-id }
            - name: GH_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: atlantis-github-app, key: webhook-secret }
          ports:
            - { name: atlantis, containerPort: 4141 }
          volumeMounts:
            - { name: repos, mountPath: /etc/atlantis }
            - { name: secrets, mountPath: /secrets, readOnly: true }
            - { name: data, mountPath: /atlantis-data }
          resources:
            # AWS provider v6 schema load + large modules (eks-mgmt) spike memory;
            # 2Gi OOM-killed the provider during plan (plugin handshake failed).
            # Guaranteed QoS (requests == limits): scheduler reserves the full 4Gi so a
            # terraform plan spike can't overcommit and starve the kubelet (node OOM /
            # NodeStatusUnknown), the limit caps Atlantis itself instead of the node, and
            # Guaranteed pods are evicted last under node pressure.
            requests: { cpu: 1000m, memory: 4Gi }
            limits:   { cpu: 1000m, memory: 4Gi }
      volumes:
        - name: repos
          configMap: { name: atlantis-config }
        - name: secrets
          secret:
            secretName: atlantis-github-app
            items:
              - { key: private-key, path: private-key }
        - name: data
          emptyDir: {}
