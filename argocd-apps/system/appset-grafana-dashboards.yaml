apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'grafana-dashboards-{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Atom-oh/AWS-Demo-Platform
        targetRevision: main
        path: k8s/system/grafana
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
