apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-runner-arm-kubernetes-docs
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'runner-arm-kubernetes-docs-{{name}}'
    spec:
      project: default
      source:
        chart: gha-runner-scale-set
        repoURL: ghcr.io/actions/actions-runner-controller-charts
        targetRevision: 0.10.1
        helm:
          valuesObject:
            githubConfigUrl: https://github.com/Atom-oh/kubernetes-docs
            githubConfigSecret: github-app-secret
            controllerServiceAccount:
              name: arc-controller-mall-apne2-mgmt-gha-rs-controller
              namespace: actions-runner-system
            runnerScaleSetName: kubernetes-docs-arm
            minRunners: 0
            maxRunners: 50
            listenerTemplate:
              spec:
                containers:
                  - name: listener
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                tolerations:
                  - key: workload-type
                    value: platform
                    effect: NoSchedule
                nodeSelector:
                  node-pool: platform
            # No DinD sidecar: VitePress frontend build has no docker step.
            # Dedicated r8g.large spot/on-demand node (2 vCPU/16GiB) via
            # runner-docs-arm NodePool, which taints the node so this runner pod
            # is the ONLY pod scheduled there -- no other workload to isolate
            # resources from. kubernetes-docs' deploy.yml builds one VitePress
            # locale at a time (measured ~8GiB peak RSS per locale, well under
            # r8g.large's ~14.5GiB safe ceiling after kubelet/system reserves,
            # see runner-arm-ec2nodeclass.yaml), so requests are set low
            # (comfortably schedulable) with NO limits -- the build can burst
            # to use the whole node if it ever runs hotter than measured; the
            # node's own eviction/OOM protection is the real backstop, not a
            # pod-level cap. Downsized from 16Gi/r6g.xlarge, itself downsized
            # from 52Gi/r6g.2xlarge (bumped from the original 26Gi/r8g.xlarge)
            # once the single-process 5-locale build was split into 5
            # sequential per-locale builds merged after the fact.
            template:
              spec:
                nodeSelector:
                  kubernetes.io/arch: arm64
                  node-pool: runner-docs-arm
                containers:
                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: ["/home/runner/run.sh"]
                    resources:
                      requests:
                        cpu: "1500m"
                        memory: "8Gi"
                tolerations:
                  - key: workload-type
                    value: ci-runner-docs
                    effect: NoSchedule
      destination:
        server: '{{server}}'
        namespace: actions-runner-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
