apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-runner-arm-kubernetes-docs
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'runner-arm-kubernetes-docs-{{name}}'
    spec:
      project: default
      source:
        chart: gha-runner-scale-set
        repoURL: ghcr.io/actions/actions-runner-controller-charts
        targetRevision: 0.10.1
        helm:
          valuesObject:
            githubConfigUrl: https://github.com/Atom-oh/kubernetes-docs
            githubConfigSecret: github-app-secret
            controllerServiceAccount:
              name: arc-controller-mall-apne2-mgmt-gha-rs-controller
              namespace: actions-runner-system
            runnerScaleSetName: kubernetes-docs-arm
            minRunners: 0
            maxRunners: 50
            listenerTemplate:
              spec:
                containers:
                  - name: listener
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                tolerations:
                  - key: workload-type
                    value: platform
                    effect: NoSchedule
                nodeSelector:
                  node-pool: platform
            # No DinD sidecar: VitePress frontend build has no docker step.
            # Dedicated r6g.xlarge spot/on-demand node (32GiB) via runner-docs-arm
            # NodePool — the 1800m/3500Mi shared ci-runner pool is too small for this
            # build. kubernetes-docs' deploy.yml split its single 5-locale build
            # (which held the whole page graph in one process and drove Node heap
            # to ~24GiB OOM) into 5 sequential per-locale builds merged after the
            # fact -- peak RSS measured at ~8GiB per locale, so 16Gi/r6g.xlarge
            # replaces the earlier 52Gi/r6g.2xlarge sizing (itself a bump from the
            # original 26Gi/r8g.xlarge) with solid headroom instead of matching
            # the old single-process build's much larger footprint.
            template:
              spec:
                nodeSelector:
                  kubernetes.io/arch: arm64
                  node-pool: runner-docs-arm
                containers:
                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: ["/home/runner/run.sh"]
                    resources:
                      requests:
                        cpu: "3000m"
                        memory: "16Gi"
                tolerations:
                  - key: workload-type
                    value: ci-runner-docs
                    effect: NoSchedule
      destination:
        server: '{{server}}'
        namespace: actions-runner-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
