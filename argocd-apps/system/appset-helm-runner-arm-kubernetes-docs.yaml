apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-runner-arm-kubernetes-docs
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'runner-arm-kubernetes-docs-{{name}}'
    spec:
      project: default
      source:
        chart: gha-runner-scale-set
        repoURL: ghcr.io/actions/actions-runner-controller-charts
        targetRevision: 0.10.1
        helm:
          valuesObject:
            githubConfigUrl: https://github.com/Atom-oh/kubernetes-docs
            githubConfigSecret: github-app-secret
            controllerServiceAccount:
              name: arc-controller-mall-apne2-mgmt-gha-rs-controller
              namespace: actions-runner-system
            runnerScaleSetName: kubernetes-docs-arm
            minRunners: 0
            maxRunners: 50
            listenerTemplate:
              spec:
                containers:
                  - name: listener
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                tolerations:
                  - key: workload-type
                    value: platform
                    effect: NoSchedule
                nodeSelector:
                  node-pool: platform
            # No DinD sidecar: VitePress frontend build has no docker step.
            # Dedicated r8g.large node (16GiB) via runner-docs-arm NodePool — the
            # 1800m/3500Mi shared ci-runner pool is too small for this build.
            template:
              spec:
                nodeSelector:
                  kubernetes.io/arch: arm64
                  node-pool: runner-docs-arm
                containers:
                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: ["/home/runner/run.sh"]
                    resources:
                      requests:
                        cpu: "1800m"
                        memory: "14Gi"
                tolerations:
                  - key: workload-type
                    value: ci-runner-docs
                    effect: NoSchedule
      destination:
        server: '{{server}}'
        namespace: actions-runner-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
