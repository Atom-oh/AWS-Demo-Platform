# ESO via Helm chart (matches the manual install in Phase B bootstrap).
# Once this is Synced, the bootstrap docs at k8s/system/external-secrets-bootstrap/
# can be removed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/cleanup
spec:
  project: default
  sources:
    - chart: external-secrets
      repoURL: https://charts.external-secrets.io
      targetRevision: 2.5.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/k8s/system/external-secrets-bootstrap/helm-values.yaml
    - repoURL: https://github.com/Atom-oh/AWS-Demo-Platform
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
