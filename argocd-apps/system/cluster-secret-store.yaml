# Bootstrap-applied ClusterSecretStore for AWS Secrets Manager.
# After ESO is up via the external-secrets Application, ArgoCD adopts this CR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/cleanup
spec:
  project: default
  source:
    repoURL: https://github.com/Atom-oh/AWS-Demo-Platform
    targetRevision: main
    path: k8s/system/external-secrets-bootstrap
    directory:
      include: 'cluster-secret-store.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
